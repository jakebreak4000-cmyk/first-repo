<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Store</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

.search {
  padding: 8px;
  border-radius: 8px;
  border: none;
  outline: none;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.15);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #38bdf8;
}

button:hover {
  background: #0ea5e9;
}

.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 300px;
  height: 100%;
  background: #020617;
  padding: 20px;
  overflow-y: auto;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 10px 0;
}
</style>
</head>

<body>

<header>
  <h1>Nova Store</h1>
  <input class="search" placeholder="Search products..." oninput="search(this.value)">
  <div>🛒 <span id="count">0</span></div>
</header>

<div class="products" id="products"></div>

<div class="cart">
  <h2>Cart</h2>
  <div id="cart"></div>
  <h3>Total: $<span id="total">0</span></h3>
</div>

<script>
const products = [
  {name:"white hoodie", price:35, img:"https://images.pexels.com/photos/6311395/pexels-photo-6311395.jpeg?auto=compress&cs=tinysrgb&w=800"},
  {name:"Shoes", price:60, img:"https://picsum.photos/200?2"},
  {name:"Watch", price:90, img:"https://picsum.photos/200?3"},
  {name:"Backpack", price:40, img:"https://picsum.photos/200?4"},
  {name:"Headphones", price:120, img:"https://picsum.photos/200?5"},
  {name:"Cap", price:20, img:"https://picsum.photos/200?6"}
];

let cart = [];
let filtered = [...products];

function render() {
  const box = document.getElementById("products");
  box.innerHTML = "";

  filtered.forEach((p, i) => {
    box.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="add(${i})">Add</button>
      </div>
    `;
  });
}

function add(i) {
  cart.push(filtered[i]);
  updateCart();
}

function updateCart() {
  document.getElementById("count").innerText = cart.length;

  let html = "";
  let total = 0;

  cart.forEach((c, i) => {
    total += c.price;
    html += `
      <div class="item">
        ${c.name} - $${c.price}
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;
}

function search(text) {
  filtered = products.filter(p =>
    p.name.toLowerCase().includes(text.toLowerCase())
  );
  render();
}

render();
</script>

</body>
</html>
